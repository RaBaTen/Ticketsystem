<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

 

<div class="app">
<aside class="sidebar">
<h2>TicketSystem</h2>
<p>Support Dashboard</p>
</aside>

 

    <main class="content">
<header>
<h1>Tickets</h1>
<div class="login-box">
<input id="username" placeholder="Username" value="admin">
<input id="password" type="password" placeholder="Password" value="admin">
<button onclick="loadTickets()">Login / Refresh</button>
</div>
</header>

 

        <section class="card">
<h2>Create Ticket</h2>
<input id="title" placeholder="Title">
<textarea id="description" placeholder="Description"></textarea>
<button onclick="createTicket()">Create</button>
</section>

 

        <section class="card">
<h2>Ticket List</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Status</th>
<th>Created By</th>
<th>Assigned To</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>
</section>
</main>
</div>

 

<script src="js/app.js"></script>
</body>
</html>
